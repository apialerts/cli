name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build for release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Test
        run: go test -v ./...
      - name: Build
        run: go build -v ./...
