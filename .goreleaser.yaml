version: 2

builds:
  - binary: apialerts
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    formats_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - repository:
      owner: apialerts
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_TOKEN }}"
    homepage: "https://apialerts.com"
    description: "API Alerts CLI — send events from your terminal"

scoops:
  - repository:
      owner: apialerts
      name: scoop-bucket
      token: "{{ .Env.GORELEASER_TOKEN }}"
    homepage: "https://apialerts.com"
    description: "API Alerts CLI — send events from your terminal"

changelog:
  sort: asc
